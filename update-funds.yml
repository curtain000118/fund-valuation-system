name: Update Fund Data

on:
  schedule:
    - cron: '0 9,12,15 * * 1-5'  # 工作日 9:00, 12:00, 15:00
  workflow_dispatch:  # 支持手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger fund update
        run: |
          curl -X POST "${{ secrets.VERCEL_APP_URL }}/api/cron/update-funds" \
               -H "Content-Type: application/json" \
               -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
      
      - name: Check response
        run: echo "Fund data update triggered successfully"
